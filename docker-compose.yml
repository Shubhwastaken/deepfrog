# Full implementation to be added later

version: "3.9"

services:
  # ── FastAPI Backend ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/customs_brain
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
      - postgres
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000

  # ── Worker (scale with --scale worker=N) ────────────────────
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/customs_brain
      - REDIS_URL=redis://redis:6379
      - WORKER_ID=worker-1
    depends_on:
      - redis
      - postgres
    command: python -m backend.worker
    deploy:
      replicas: 2

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=customs_brain
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  redis_data:
  pg_data:
