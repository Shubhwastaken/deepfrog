version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: customs_brain
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@postgres/customs_brain
      REDIS_URL: redis://redis:6379
      SHARED_DATA_DIR: /app/data
      UPLOAD_DIR: /app/data/uploads
      REPORT_DIR: /app/data/reports
    depends_on: [postgres, redis]
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./agents:/app/agents
      - ./shared:/app/shared
      - shared_data:/app/data

  worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@postgres/customs_brain
      REDIS_URL: redis://redis:6379
      SHARED_DATA_DIR: /app/data
      UPLOAD_DIR: /app/data/uploads
      REPORT_DIR: /app/data/reports
    depends_on: [postgres, redis]
    volumes:
      - shared_data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on: [backend]

  nginx:
    image: nginx:alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on: [backend, frontend]

volumes:
  pgdata:
  shared_data:
