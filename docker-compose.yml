version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d customs_brain"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      customs_brain:
        aliases:
          - db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      customs_brain:
        aliases:
          - cache

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      SHARED_DATA_DIR: /app/data
      UPLOAD_DIR: /app/data/uploads
      REPORT_DIR: /app/data/reports
      LOG_DIR: /app/data/logs
      SERVICE_NAME: backend
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - shared_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      customs_brain:
        aliases:
          - api

  worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      SHARED_DATA_DIR: /app/data
      UPLOAD_DIR: /app/data/uploads
      REPORT_DIR: /app/data/reports
      LOG_DIR: /app/data/logs
      SERVICE_NAME: worker-a
      WORKER_NAME: worker-a
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - shared_data:/app/data
    networks:
      customs_brain:
        aliases:
          - jobs

  worker_2:
    build:
      context: .
      dockerfile: workers/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      SHARED_DATA_DIR: /app/data
      UPLOAD_DIR: /app/data/uploads
      REPORT_DIR: /app/data/reports
      LOG_DIR: /app/data/logs
      SERVICE_NAME: worker-b
      WORKER_NAME: worker-b
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - shared_data:/app/data
    networks:
      customs_brain:
        aliases:
          - jobs-2

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: ""
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      customs_brain:
        aliases:
          - ui

  nginx:
    image: nginx:alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      customs_brain:
        aliases:
          - gateway

  loki:
    image: grafana/loki:3.1.1
    profiles: ["observability"]
    command: ["-config.file=/etc/loki/config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./infra/observability/loki-config.yml:/etc/loki/config.yaml:ro
    networks:
      customs_brain:
        aliases:
          - loki

  promtail:
    image: grafana/promtail:3.1.1
    profiles: ["observability"]
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      - loki
    volumes:
      - ./infra/observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - shared_data:/var/log/customs-brain:ro
    networks:
      customs_brain:
        aliases:
          - promtail

  grafana:
    image: grafana/grafana:11.1.0
    profiles: ["observability"]
    depends_on:
      - loki
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - ./infra/observability/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    networks:
      customs_brain:
        aliases:
          - grafana

volumes:
  pgdata:
  shared_data:

networks:
  customs_brain:
    name: customs_brain_network
