version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: customs_brain
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d customs_brain"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      customs_brain:
        aliases:
          - db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      customs_brain:
        aliases:
          - cache

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@postgres/customs_brain
      REDIS_URL: redis://redis:6379
      SHARED_DATA_DIR: /app/data
      UPLOAD_DIR: /app/data/uploads
      REPORT_DIR: /app/data/reports
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - shared_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      customs_brain:
        aliases:
          - api

  worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@postgres/customs_brain
      REDIS_URL: redis://redis:6379
      SHARED_DATA_DIR: /app/data
      UPLOAD_DIR: /app/data/uploads
      REPORT_DIR: /app/data/reports
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - shared_data:/app/data
    networks:
      customs_brain:
        aliases:
          - jobs

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: ""
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      customs_brain:
        aliases:
          - ui

  nginx:
    image: nginx:alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      customs_brain:
        aliases:
          - gateway

volumes:
  pgdata:
  shared_data:

networks:
  customs_brain:
    name: customs_brain_network
