  <text x="110" y="144" fill="#14213d" font-size="58" font-family="Georgia, serif" font-weight="700">Security Proof</text>
  <text x="110" y="186" fill="#4f5d75" font-size="24" font-family="Segoe UI, Arial, sans-serif">Admin-only proof page that reads raw encrypted PostgreSQL values for judges and auditors.</text>
  <rect x="110" y="228" width="1380" height="112" rx="28" fill="#fffaf2" stroke="#e3dacd"/>
  <rect x="150" y="262" width="170" height="40" rx="20" fill="#284f3b"/>
