  <text x="556" y="289" fill="#fff2be" font-size="20" font-family="Segoe UI, Arial, sans-serif">Passwords hashed</text>
  <text x="150" y="322" fill="#4f5d75" font-size="22" font-family="Segoe UI, Arial, sans-serif">This page proves the browser never sees plaintext values from the raw database tables.</text>
  <rect x="110" y="378" width="670" height="442" rx="28" fill="#fffaf2" stroke="#e3dacd"/>
  <text x="150" y="418" fill="#8d3f18" font-size="18" font-family="Segoe UI, Arial, sans-serif" letter-spacing="4">USERS TABLE</text>
  <text x="150" y="460" fill="#14213d" font-size="40" font-family="Georgia, serif" font-weight="700">User storage proof</text>
