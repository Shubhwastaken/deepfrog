<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">Customs Brain security proof screen</title>
  <desc id="desc">Representative admin-only storage proof page showing encrypted user and job data samples.</desc>
  <rect width="1600" height="920" fill="#f4efe4"/>
  <circle cx="190" cy="110" r="170" fill="#f7d9c9" opacity="0.45"/>
  <circle cx="1420" cy="120" r="190" fill="#d9e1ef" opacity="0.45"/>
